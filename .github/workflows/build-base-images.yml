name: Build Base Images

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Base image to build"
        required: true
        default: "python-base-ml"
        type: choice
        options:
          - python-base-ml

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.corbello.io
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: docker/${{ inputs.image }}
          push: true
          tags: |
            harbor.corbello.io/osint/python-base:ml-latest
            harbor.corbello.io/osint/python-base:ml-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
