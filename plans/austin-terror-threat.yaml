version: 2
plan_id: austin-terror-threat
plan_type: child
parent_plan_id: cortech-osint-master
retention_class: standard
description: "Monitor for terrorism, extremism, and mass violence threat signals in the Austin, TX / Travis County area."

keywords:
  - terrorism
  - terrorist
  - extremist
  - extremism
  - bombing
  - bomber
  - shooter
  - shooting
  - mass shooting
  - attack
  - threat
  - weapon
  - explosive
  - hostage
  - radicalization
  - militia
  - lone wolf
  - suspicious package
  - active shooter
  - manhunt
  - Austin
  - Travis County

source_profiles:
  gdelt_austin:
    reliability: C
    credibility: 3
    corroboration_required: true
    license: "free"
  kxan_rss:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "public"
  kvue_rss:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "public"
  cbsaustin_rss:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "public"
  fox7austin_rss:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "public"
  fbi_news_rss:
    reliability: A
    credibility: 1
    corroboration_required: false
    license: "public"
  nws_austin:
    reliability: A
    credibility: 1
    corroboration_required: false
    license: "public-domain"
  acled_us:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "oauth"
  reddit_austin:
    reliability: D
    credibility: 4
    corroboration_required: true
    license: "public"

sources:
  - id: gdelt_austin
    type: gdelt_api
    url: "https://api.gdeltproject.org/api/v2/doc/doc"
    schedule_cron: "*/30 * * * *"
    params:
      query: "terrorism OR terrorist OR extremist OR bombing OR shooter OR attack OR threat OR militia OR radicalization"
      geo_terms: "Austin OR \"Travis County\" OR Texas"
      mode: "ArtList"
      maxrecords: "75"
      format: "json"
      lookback_hours: 4
      preferred_languages: ["English", "Spanish"]
      max_per_domain: 5

  - id: kxan_rss
    type: rss
    url: "https://www.kxan.com/feed/"
    schedule_cron: "*/30 * * * *"

  - id: kvue_rss
    type: rss
    url: "https://www.kvue.com/feeds/syndication/rss/news"
    schedule_cron: "*/30 * * * *"

  - id: cbsaustin_rss
    type: rss
    url: "https://cbsaustin.com/news/local.rss"
    schedule_cron: "*/30 * * * *"

  - id: fox7austin_rss
    type: rss
    url: "https://www.fox7austin.com/rss/category/local-news"
    schedule_cron: "*/30 * * * *"

  - id: fbi_news_rss
    type: rss
    url: "https://www.fbi.gov/feeds/fbi-in-the-news/rss.xml"
    schedule_cron: "0 */6 * * *"

  - id: nws_austin
    type: nws_alerts
    url: "https://api.weather.gov/alerts/active"
    schedule_cron: "*/15 * * * *"
    params:
      zone: TXC453

  - id: acled_us
    type: acled_api
    url: "https://acleddata.com/api/acled/read"
    schedule_cron: "0 */4 * * *"
    params:
      email: "${OSINT_ACLED_EMAIL}"
      password: "${OSINT_ACLED_PASSWORD}"
      country: "United States"
      max_items: 50

  - id: reddit_austin
    type: reddit
    schedule_cron: "*/30 * * * *"
    params:
      subreddits: ["Austin", "texas", "TexasPolitics"]
      sort: "new"
      limit: 50
      keyword_filter:
        - terrorism
        - terrorist
        - shooting
        - bomber
        - explosion
        - threat
        - active shooter
        - suspicious package
        - manhunt
        - hostage
        - militia

target_geo:
  country_codes: ["USA"]
  lat: 30.2672
  lon: -97.7431
  radius_km: 100

scoring:
  recency_half_life_hours: 168
  source_reputation:
    gdelt_austin: 0.53
    kxan_rss: 0.8
    kvue_rss: 0.8
    cbsaustin_rss: 0.8
    fox7austin_rss: 0.8
    fbi_news_rss: 1.0
    nws_austin: 0.67
    acled_us: 0.67
    reddit_austin: 0.3
  ioc_match_boost: 2.0

enrichment:
  nlp_enabled: true
  mission: "Monitor terrorism, extremism, and mass violence threats in the Austin, Texas metropolitan area"
  classify_relevance: true
  extract_entities: true
  generate_summaries: true

notifications:
  routes:
    - name: austin-threat-high
      when:
        severity_gte: high
      channels:
        - type: gotify
          application: "osint-austin-terror"
          priority: 8
    - name: austin-threat-critical
      when:
        severity_gte: critical
      channels:
        - type: gotify
          application: "osint-austin-terror"
          priority: 10
