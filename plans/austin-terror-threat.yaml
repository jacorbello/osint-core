version: 2
plan_id: austin-terror-threat
plan_type: child
parent_plan_id: cortech-osint-master
retention_class: standard
description: "Monitor for terrorism, extremism, and mass violence threat signals in the Austin, TX / Travis County area."

keywords:
  - terrorism
  - terrorist
  - extremist
  - extremism
  - bombing
  - bomber
  - shooter
  - shooting
  - mass shooting
  - attack
  - threat
  - weapon
  - explosive
  - hostage
  - Austin
  - Travis County

source_profiles:
  gdelt_austin:
    reliability: C
    credibility: 3
    corroboration_required: true
    license: "free"
  reliefweb_crises:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "free"
  kxan_rss:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "public"
  fbi_news_rss:
    reliability: A
    credibility: 1
    corroboration_required: false
    license: "public"

sources:
  - id: gdelt_austin
    type: gdelt_api
    url: "https://api.gdeltproject.org/api/v2/doc/doc"
    schedule_cron: "*/15 * * * *"
    params:
      query: "terrorism OR terrorist OR extremist OR bombing OR shooter OR attack OR threat"
      geo_terms: "Austin OR \"Travis County\" OR Texas"
      mode: "ArtList"
      maxrecords: "75"
      format: "json"
      lookback_hours: 4
      preferred_languages: ["English", "Spanish"]
      max_per_domain: 5

  - id: reliefweb_crises
    type: reliefweb_api
    url: "https://api.reliefweb.int/v2/reports"
    schedule_cron: "0 */4 * * *"
    params:
      appname: "osint-core-cortech"

  - id: kxan_rss
    type: rss
    url: "https://www.kxan.com/feed/"
    schedule_cron: "*/30 * * * *"

  - id: fbi_news_rss
    type: rss
    url: "https://www.fbi.gov/feeds/fbi-in-the-news/rss.xml"
    schedule_cron: "0 */6 * * *"

target_geo:
  country_codes: ["USA"]
  lat: 30.2672
  lon: -97.7431
  radius_km: 100

scoring:
  recency_half_life_hours: 168
  source_reputation:
    gdelt_austin: 0.53
    reliefweb_crises: 0.67
    kxan_rss: 0.8
    fbi_news_rss: 1.0
  ioc_match_boost: 2.0

enrichment:
  nlp_enabled: true
  mission: "Monitor terrorism, extremism, and mass violence threats in the Austin, Texas metropolitan area"
  classify_relevance: true
  extract_entities: true
  generate_summaries: true

notifications:
  routes:
    - name: austin-threat-high
      when:
        severity_gte: high
      channels:
        - type: gotify
          application: "osint-austin-terror"
          priority: 8
    - name: austin-threat-critical
      when:
        severity_gte: critical
      channels:
        - type: gotify
          application: "osint-austin-terror"
          priority: 10
