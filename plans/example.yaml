version: 1
plan_id: libertycenter-osint
description: "Liberty Center OSINT monitoring plan"
retention_class: standard

sources:
  - id: cisa_kev
    type: cisa_kev
    url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
    weight: 1.3
    schedule_cron: "0 */4 * * *"
  - id: nvd_feeds_recent
    type: nvd_json_feed
    url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
    weight: 1.0
    schedule_cron: "15 */2 * * *"
  - id: osv_pypi
    type: osv_api
    url: "https://api.osv.dev/v1/query"
    weight: 0.9
    schedule_cron: "30 */6 * * *"
  - id: urlhaus_recent
    type: urlhaus_api
    url: "https://urlhaus-api.abuse.ch/v1/"
    weight: 1.1
    schedule_cron: "0 */3 * * *"
  - id: threatfox_iocs
    type: threatfox_api
    url: "https://threatfox-api.abuse.ch/api/v1/"
    weight: 1.2
    schedule_cron: "45 */4 * * *"
  - id: security_rss
    type: rss
    url: "https://feeds.feedburner.com/TheHackersNews"
    weight: 0.8
    schedule_cron: "0 */1 * * *"

scoring:
  recency_half_life_hours: 48
  source_reputation:
    cisa_kev: 1.3
    nvd_feeds_recent: 1.0
    urlhaus_recent: 1.1
    threatfox_iocs: 1.2
  ioc_match_boost: 2.5
  force_alert:
    min_severity: high
    tags_any: ["force_alert", "critical_vuln"]

notifications:
  default_dedupe_window_minutes: 90
  quiet_hours:
    timezone: "America/Chicago"
    start: "22:00"
    end: "07:00"
  routes:
    - name: critical_gotify
      when:
        severity_gte: high
      channels:
        - type: gotify
          application: "osint-alerts"
          priority: 8
    - name: daily_digest
      when:
        severity_gte: low
      channels:
        - type: gotify
          application: "osint-digest"
          priority: 4
