version: 2
plan_id: humanitarian-intel
plan_type: child
parent_plan_id: cortech-osint-master
retention_class: standard
description: "Humanitarian and human rights intelligence sources."

source_profiles:
  reliefweb:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "free"
  hrw_news:
    reliability: A
    credibility: 2
    corroboration_required: false
    license: "public"
  amnesty:
    reliability: A
    credibility: 2
    corroboration_required: false
    license: "public"

sources:
  - id: reliefweb
    type: reliefweb_api
    url: "https://api.reliefweb.int/v2/reports"
    schedule_cron: "0 */4 * * *"
    params:
      appname: "osint-core-cortech"

  - id: hrw_news
    type: rss
    url: "https://www.hrw.org/rss/news"
    schedule_cron: "0 */6 * * *"

  - id: amnesty
    type: rss
    url: "https://www.amnesty.org/en/feed/"
    schedule_cron: "0 */6 * * *"

  - id: acled_global
    type: acled_api
    url: "https://acleddata.com/api/acled/read"
    schedule_cron: "0 */4 * * *"
    params:
      email: "${OSINT_ACLED_EMAIL}"
      password: "${OSINT_ACLED_PASSWORD}"
      max_items: 100

scoring:
  recency_half_life_hours: 24
  source_reputation:
    reliefweb: 0.67
    hrw_news: 0.8
    amnesty: 0.8
    acled_global: 0.67
  ioc_match_boost: 1.5

enrichment:
  nlp_enabled: true
  mission: "Monitor humanitarian crises, human rights violations, and disaster events globally"
  classify_relevance: true
  extract_entities: true
  generate_summaries: true

notifications:
  routes:
    - name: humanitarian-high
      when:
        severity_gte: high
      channels:
        - type: gotify
          application: "osint-humanitarian"
          priority: 7
