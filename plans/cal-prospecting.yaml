version: 2
plan_id: cal-prospecting
plan_type: child
parent_plan_id: cortech-osint-master
retention_class: evidentiary
description: >-
  Constitutional rights prospecting for The Center For American Liberty.
  Monitors First Amendment, parental rights, religious liberty, and due process
  violations across CA, TX, MN, and DC jurisdictions.

keywords:
  - First Amendment
  - free speech
  - campus speech
  - academic freedom
  - religious liberty
  - parental rights
  - due process
  - Title IX
  - DEI mandate
  - compelled speech
  - viewpoint discrimination
  - student rights
  - faculty termination
  - speech code
  - bias response team
  - pronoun policy
  - misgendering
  - gender identity policy
  - drag queen story hour
  - curriculum objection
  - vaccine mandate
  - school choice

sources:
  # ── xAI x_search: California ──────────────────────────────────
  - id: x_cal_california
    type: xai_x_search
    schedule_cron: "0 7,14 * * *"
    weight: 1.0
    params:
      api_key: "${OSINT_XAI_API_KEY}"
      model: "grok-4.20-reasoning"
      lookback_hours: 12
      max_results: 50
      searches:
        - "(\"free speech\" OR \"First Amendment\" OR \"viewpoint discrimination\") (UC OR UCLA OR Berkeley OR USC OR Stanford OR \"Cal State\") lang:en"
        - "(\"Title IX\" OR \"due process\" OR \"campus speech code\") California university lang:en"
        - "(\"religious liberty\" OR \"compelled speech\" OR \"pronoun policy\" OR \"misgendering\" OR \"gender identity policy\") California school lang:en"
        - "student or professor punished for speech or beliefs at California university"
      geo_terms: "California"
      mission: >-
        You are a constitutional rights analyst for The Center For American Liberty.
        Search for incidents where students, faculty, or staff at California institutions
        face discipline, termination, or policy enforcement that may violate First Amendment
        rights, religious liberty, parental rights, or due process protections. Focus on
        actionable cases with identified institutions and specific policy violations.
      allowed_x_handles:
        - TheFIREorg
        - CampusReform
        - GoldwaterInst
        - CalLiberty
        - FIREprez
        - RealCandaceO
        - JonathanTurley
        - RobSchneider

  # ── xAI x_search: Texas ───────────────────────────────────────
  - id: x_cal_texas
    type: xai_x_search
    schedule_cron: "5 7,14 * * *"
    weight: 1.0
    params:
      api_key: "${OSINT_XAI_API_KEY}"
      model: "grok-4.20-reasoning"
      lookback_hours: 12
      max_results: 50
      searches:
        - "(\"free speech\" OR \"First Amendment\" OR \"viewpoint discrimination\") (UT OR \"Texas A&M\" OR Baylor OR \"Texas State\" OR \"Texas Tech\") lang:en"
        - "(\"Title IX\" OR \"due process\" OR \"DEI mandate\") Texas university lang:en"
        - "(\"parental rights\" OR \"curriculum objection\" OR \"school choice\") Texas lang:en"
        - "student or professor punished for speech or beliefs at Texas university"
      geo_terms: "Texas"
      mission: >-
        You are a constitutional rights analyst for The Center For American Liberty.
        Search for incidents where students, faculty, or staff at Texas institutions
        face discipline, termination, or policy enforcement that may violate First Amendment
        rights, religious liberty, parental rights, or due process protections. Focus on
        actionable cases with identified institutions and specific policy violations.
      allowed_x_handles:
        - TheFIREorg
        - CampusReform
        - GoldwaterInst
        - FIREprez
        - JonathanTurley
        - TexasScorecard
        - TCFPPolicy

  # ── xAI x_search: Minnesota ───────────────────────────────────
  - id: x_cal_minnesota
    type: xai_x_search
    schedule_cron: "10 7,14 * * *"
    weight: 1.0
    params:
      api_key: "${OSINT_XAI_API_KEY}"
      model: "grok-4.20-reasoning"
      lookback_hours: 12
      max_results: 50
      searches:
        - "(\"free speech\" OR \"First Amendment\" OR \"viewpoint discrimination\") (\"University of Minnesota\" OR \"Minnesota State\" OR \"St. Thomas\" OR Macalester) lang:en"
        - "(\"Title IX\" OR \"due process\" OR \"DEI mandate\") Minnesota university lang:en"
        - "(\"parental rights\" OR \"religious liberty\" OR \"school choice\") Minnesota lang:en"
        - "student or professor punished for speech or beliefs at Minnesota university"
      geo_terms: "Minnesota"
      mission: >-
        You are a constitutional rights analyst for The Center For American Liberty.
        Search for incidents where students, faculty, or staff at Minnesota institutions
        face discipline, termination, or policy enforcement that may violate First Amendment
        rights, religious liberty, parental rights, or due process protections. Focus on
        actionable cases with identified institutions and specific policy violations.
      allowed_x_handles:
        - TheFIREorg
        - CampusReform
        - GoldwaterInst
        - FIREprez
        - JonathanTurley
        - AlphaNewsMN
        - CtrAmExperiment

  # ── xAI x_search: DC / Federal ────────────────────────────────
  - id: x_cal_dc
    type: xai_x_search
    schedule_cron: "15 7,14 * * *"
    weight: 1.0
    params:
      api_key: "${OSINT_XAI_API_KEY}"
      model: "grok-4.20-reasoning"
      lookback_hours: 12
      max_results: 50
      searches:
        - "(\"free speech\" OR \"First Amendment\" OR \"viewpoint discrimination\") (Georgetown OR \"George Washington\" OR Howard OR \"American University\" OR \"Catholic University\") lang:en"
        - "(\"Title IX\" OR \"due process\" OR \"campus speech\") \"Washington DC\" university lang:en"
        - "(\"religious liberty\" OR \"parental rights\") federal policy OR regulation lang:en"
        - "student or professor punished for speech or beliefs at DC university"
      geo_terms: "Washington DC OR District of Columbia"
      mission: >-
        You are a constitutional rights analyst for The Center For American Liberty.
        Search for incidents where students, faculty, or staff at DC-area institutions
        face discipline, termination, or policy enforcement that may violate First Amendment
        rights, religious liberty, parental rights, or due process protections. Also monitor
        federal policy changes affecting campus speech and religious liberty nationwide.
      allowed_x_handles:
        - TheFIREorg
        - CampusReform
        - GoldwaterInst
        - FIREprez
        - JonathanTurley
        - Heritage
        - BeckettLaw

  # ── RSS: FIRE (Foundation for Individual Rights and Expression) ──
  - id: rss_fire
    type: rss
    url: "https://www.thefire.org/feed"
    schedule_cron: "20 7,14 * * *"
    weight: 1.5
    params:
      max_items: 30

  # ── RSS: Higher Ed Dive ──────────────────────────────────────
  - id: rss_higher_ed_dive
    type: rss
    url: "https://www.highereddive.com/feeds/news/"
    schedule_cron: "25 7,14 * * *"
    weight: 1.2
    params:
      max_items: 30

  # ── RSS: Reason / Volokh Conspiracy ──────────────────────────
  - id: rss_volokh
    type: rss
    url: "https://reason.com/volokh/feed/"
    schedule_cron: "30 7,14 * * *"
    weight: 1.3
    params:
      max_items: 30

  # ── RSS: Courthouse News Service ─────────────────────────────
  - id: rss_courthouse_news
    type: rss
    url: "https://www.courthousenews.com/feed/"
    schedule_cron: "35 7,14 * * *"
    weight: 1.4
    params:
      max_items: 30

  # ── University Policy: UC System ─────────────────────────────
  - id: univ_uc
    type: university_policy
    schedule_cron: "0 8 * * 1"
    weight: 1.8
    params:
      institutions:
        - name: "University of California System"
          policy_url: "https://policy.ucop.edu/advanced-search.php?action=welcome&op=browse&all=1"
          selector: "a.blue[href*='/doc/']"
      archive_pdfs: true

  # ── University Policy: CSU System ────────────────────────────
  # DISABLED: calstate.edu returns 403 (JavaScript bot check). Uncomment
  # when headless-browser support is added or an accessible policy
  # endpoint is found. See #220.
  # - id: univ_csu
  #   type: university_policy
  #   schedule_cron: "5 8 * * 1"
  #   weight: 1.8
  #   params:
  #     institutions:
  #       - name: "California State University System"
  #         policy_url: "https://www.calstate.edu/csu-system/board-of-trustees/past-meetings"
  #         selector: "a[href$='.pdf'], a[href*='policy']"
  #     archive_pdfs: true

  # ── University Policy: UT System ─────────────────────────────
  - id: univ_ut
    type: university_policy
    schedule_cron: "10 8 * * 1"
    weight: 1.8
    params:
      institutions:
        - name: "University of Texas System"
          policy_url: "https://www.utsystem.edu/offices/board-regents/regents-rules-and-regulations"
          selector: "a[href$='.pdf'], a[href*='rule'], a[href*='policy']"
      archive_pdfs: true

  # ── University Policy: TAMU System ───────────────────────────
  - id: univ_tamu
    type: university_policy
    schedule_cron: "15 8 * * 1"
    weight: 1.8
    params:
      institutions:
        - name: "Texas A&M University System"
          policy_url: "https://policies.tamus.edu"
          selector: "a[href$='.pdf']"
      archive_pdfs: true

  # ── University Policy: UMN ───────────────────────────────────
  - id: univ_umn
    type: university_policy
    schedule_cron: "20 8 * * 1"
    weight: 1.8
    params:
      institutions:
        - name: "University of Minnesota"
          policy_url: "https://policy.umn.edu/policies"
          selector: "a[href*='policy']"
      archive_pdfs: true

  # ── University Policy: UDC ───────────────────────────────────
  - id: univ_udc
    type: university_policy
    schedule_cron: "25 8 * * 1"
    weight: 1.8
    params:
      institutions:
        - name: "University of the District of Columbia"
          policy_url: "https://www.udc.edu/about/administration/ogc/policies"
          selector: "a[href$='.pdf']"
      archive_pdfs: true

