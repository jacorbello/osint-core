scoring:
  recency_half_life_hours: 168
  source_reputation:
    x_cal_california: 0.4
    x_cal_texas: 0.4
    x_cal_minnesota: 0.4
    x_cal_dc: 0.4
    rss_fire: 0.9
    rss_higher_ed_dive: 0.7
    rss_volokh: 0.8
    rss_courthouse_news: 0.85
    univ_uc: 0.95
    # univ_csu: 0.95  # disabled (see #213)
    univ_ut: 0.95
    univ_tamu: 0.95
    univ_umn: 0.95
    univ_udc: 0.95
  ioc_match_boost: 1.5

enrichment:
  nlp_enabled: true
  mission: >-
    Identify constitutional rights violations at educational institutions for
    The Center For American Liberty. Focus on First Amendment, parental rights,
    religious liberty, and due process cases with litigation potential.
  classify_relevance: true
  extract_entities: true
  generate_summaries: true

custom:
  lead_confidence_threshold: 0.3
  report_schedule:
    timezone: "America/Chicago"
    times:
      - "08:00"
      - "15:00"
  resend:
    from_email: "reports@mail.corbello.io"
    recipients:
      - "${CAL_REPORT_RECIPIENT_1}"
      - "${CAL_REPORT_RECIPIENT_2}"
    subject_prefix: "CAL Prospecting Report"

notifications:
  routes:
    - name: cal-prospecting-high
      when:
        severity_gte: high
      channels:
        - type: gotify
          application: "osint-cal-prospecting"
          priority: 8
    - name: cal-prospecting-critical
      when:
        severity_gte: critical
      channels:
        - type: gotify
          application: "osint-cal-prospecting"
          priority: 10
    - name: cal-prospecting-email
      when:
        severity_gte: medium
      channels:
        - type: email
          to: "${CAL_REPORT_RECIPIENT_1}"
