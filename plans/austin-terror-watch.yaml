version: 2
plan_id: austin-terror-watch
plan_type: child
parent_plan_id: cortech-osint-master
retention_class: standard
description: "Monitor for terrorism, extremism, and mass violence signals in the Austin, TX / Travis County area."

keywords:
  - terrorism
  - terrorist
  - extremist
  - extremism
  - bombing
  - bomber
  - shooter
  - shooting
  - mass shooting
  - attack
  - threat
  - weapon
  - explosive
  - hostage
  - Austin
  - Travis County

source_profiles:
  gdelt_austin_terror:
    reliability: C
    credibility: 3
    corroboration_required: true
    license: "free"
  reliefweb_us:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "free"
  austin_news:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "public"
  fbi_press:
    reliability: A
    credibility: 1
    corroboration_required: false
    license: "public"

sources:
  - id: gdelt_austin_terror
    type: gdelt_api
    url: "https://api.gdeltproject.org/api/v2/doc/doc"
    schedule_cron: "*/15 * * * *"
    params:
      query: "terrorism OR terrorist OR extremist OR bombing OR shooter OR attack OR threat"
      geo_terms: "Austin OR Travis County OR Texas"
      mode: "ArtList"
      maxrecords: "75"
      format: "json"
      lookback_hours: 4
      preferred_languages: ["English", "Spanish"]
      max_per_domain: 5

  - id: reliefweb_us
    type: reliefweb_api
    url: "https://api.reliefweb.int/v2/reports"
    schedule_cron: "0 */4 * * *"
    params:
      appname: "osint-core-cortech"

  - id: austin_statesman
    type: rss
    url: "https://www.statesman.com/rss/"
    schedule_cron: "*/30 * * * *"

  - id: kxan_news
    type: rss
    url: "https://www.kxan.com/feed/"
    schedule_cron: "*/30 * * * *"

  - id: fbi_press
    type: rss
    url: "https://www.fbi.gov/feeds/fbi-in-the-news/rss.xml"
    schedule_cron: "0 */6 * * *"

  - id: nws_austin
    type: nws_alerts
    url: "https://api.weather.gov/alerts/active"
    schedule_cron: "*/15 * * * *"
    params:
      zone: TXC453

  - id: acled_us
    type: acled_api
    url: "https://api.acleddata.com/acled/read"
    schedule_cron: "0 */4 * * *"
    params:
      api_key: "${OSINT_ACLED_API_KEY}"
      email: "${OSINT_ACLED_EMAIL}"
      country: "United States"
      max_items: 50

target_geo:
  country_codes: ["USA"]
  lat: 30.2672
  lon: -97.7431
  radius_km: 100

scoring:
  recency_half_life_hours: 12
  source_reputation:
    gdelt_austin_terror: 0.53
    reliefweb_us: 0.67
    austin_statesman: 0.8
    kxan_news: 0.8
    fbi_press: 1.0
    nws_austin: 0.67
    acled_us: 0.67
  ioc_match_boost: 2.0

enrichment:
  nlp_enabled: true
  mission: "Monitor terrorism, extremism, and mass violence threats in the Austin, Texas metropolitan area"
  classify_relevance: true
  extract_entities: true
  generate_summaries: true

notifications:
  routes:
    - name: austin-terror-high
      when:
        severity_gte: high
      channels:
        - type: gotify
          application: "osint-austin-terror"
          priority: 8
    - name: austin-terror-critical
      when:
        severity_gte: critical
      channels:
        - type: gotify
          application: "osint-austin-terror"
          priority: 10
