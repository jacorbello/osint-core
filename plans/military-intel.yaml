version: 2
plan_id: military-intel
plan_type: child
parent_plan_id: cortech-osint-master
retention_class: standard
description: "Military and conflict intelligence sources."

source_profiles:
  gdelt_global:
    reliability: B
    credibility: 3
    corroboration_required: true
    license: "open"
  isw_assessments:
    reliability: A
    credibility: 2
    corroboration_required: false
    license: "public"
  bbc_world:
    reliability: A
    credibility: 2
    corroboration_required: false
    license: "excerpts-only"
  bbc_mideast:
    reliability: A
    credibility: 2
    corroboration_required: false
    license: "excerpts-only"
  bbc_europe:
    reliability: A
    credibility: 2
    corroboration_required: false
    license: "excerpts-only"
  bellingcat:
    reliability: A
    credibility: 2
    corroboration_required: false
    license: "public"
  uk_mod:
    reliability: A
    credibility: 2
    corroboration_required: false
    license: "ogl-open"
  crisiswatch:
    reliability: A
    credibility: 3
    corroboration_required: false
    license: "public"
  crisiswatch_global:
    reliability: A
    credibility: 3
    corroboration_required: false
    license: "public"
  shodan_monitor:
    reliability: B
    credibility: 2
    corroboration_required: false
    license: "api-key"

sources:
  - id: gdelt_global
    type: gdelt_api
    url: "https://api.gdeltproject.org/api/v2/doc/doc"
    weight: 1.0
    schedule_cron: "*/15 * * * *"
    params:
      query: "conflict OR military OR attack OR troops OR airstrike OR bombing"
      mode: "ArtList"
      format: "json"
      maxrecords: 75
      timespan: "15min"

  - id: isw_assessments
    type: rss
    url: "https://www.iswresearch.org/feeds/posts/default"
    weight: 1.2
    schedule_cron: "0 */4 * * *"

  - id: bbc_world
    type: rss
    url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    weight: 0.8
    schedule_cron: "0 */2 * * *"

  - id: bbc_mideast
    type: rss
    url: "https://feeds.bbci.co.uk/news/world/middle_east/rss.xml"
    weight: 0.8
    schedule_cron: "0 */2 * * *"

  - id: bbc_europe
    type: rss
    url: "https://feeds.bbci.co.uk/news/world/europe/rss.xml"
    weight: 0.8
    schedule_cron: "0 */2 * * *"

  - id: bellingcat
    type: rss
    url: "https://www.bellingcat.com/feed/"
    weight: 1.3
    schedule_cron: "0 */6 * * *"

  - id: uk_mod
    type: rss
    url: "https://www.gov.uk/government/organisations/ministry-of-defence.atom"
    weight: 1.3
    schedule_cron: "0 */4 * * *"

  - id: crisiswatch
    type: rss
    url: "https://www.crisisgroup.org/rss/crisiswatch"
    weight: 1.4
    schedule_cron: "0 8 * * *"

  - id: crisiswatch_global
    type: rss
    url: "https://www.crisisgroup.org/rss"
    weight: 1.1
    schedule_cron: "0 */6 * * *"

  - id: shodan_monitor
    type: shodan_api
    url: "https://api.shodan.io/shodan/host/search"
    weight: 0.8
    schedule_cron: "0 */12 * * *"
    params:
      query: "port:22 country:US"

scoring:
  recency_half_life_hours: 6
  source_reputation:
    gdelt_global: 0.8
    isw_assessments: 1.5
    bbc_world: 1.0
    bbc_mideast: 1.0
    bbc_europe: 1.0
    bellingcat: 1.3
    uk_mod: 1.3
    crisiswatch: 1.4
    crisiswatch_global: 1.1
    shodan_monitor: 0.8
  ioc_match_boost: 2.0

notifications:
  routes:
    - name: military-critical
      when:
        severity_gte: high
      channels:
        - type: gotify
          application: "osint-military"
          priority: 9
